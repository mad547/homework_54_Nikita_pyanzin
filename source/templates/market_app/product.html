{% extends 'base.html' %}

{% block content %}
<div class="card my-5">
    <div class="card-header fs-4 text-center py-3">{{ product.title }}</div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <img src="{{ product.image }}"  class="img-fluid rounded" alt="{{ product.title }}">
            </div>
            <div class="col-md-8">
                <p class="text-muted">{{ product.category }}</p>
                <p class="fw-bold fs-4">{{ product.price }} сом</p>
                <p style="white-space: pre-wrap;">{{ product.description|default:"-" }}</p>
                <p class="text-muted">
                    <small>добавлен: {{ product.created_at|date:'d/m/Y H:i' }}</small>
                </p>
            </div>
        </div>
    </div>
    <div class="card-footer py-3">
        <a href="{% url 'product_edit' product.pk %}" class="btn btn-sm btn-primary">Редактировать</a>
        <a href="{% url 'product_delete' product.pk %}" class="btn btn-sm btn-danger float-end">Удалить</a>
    </div>
</div>
{% endblock %}
