{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header fs-4 text-center py-3">{{ product.title }}</div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <img src="{{ product.image }}"  class="img-fluid rounded shadow-sm" alt="{{ product.title }}">
            </div>
            <div class="col-md-8">
                <p class="text-muted mb-1">{{ product.category }}</p>
                <p class="fw-bold fs-3 text-success">{{ product.price }} сом</p>
                <p class="mb-1"><strong>Остаток</strong> {{ product.stock }} шт</p>
                <hr>
                <p style="white-space: pre-wrap;">{{ product.description|default:"-" }}</p>
                <p class="text-muted">
                    <small>добавлен: {{ product.created_at|date:'d/m/Y H:i' }}</small>
                </p>
            </div>
        </div>
    </div>
    <div class="card-footer py-3 d-flex justify-content-between">
        <a href="{% url 'products' %}" class="btn btn-sm btn-outline-secondary">Назад</a>
        <div>
            <form method="POST" action="{% url 'cart_add' product.pk " class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-success me-2">В корзину</button>
            </form>
            <a href="{% url 'product_edit' product.pk %}" class="btn btn-sm btn-primary me-2">Редактировать</a>
            <a href="{% url 'product_delete' product.pk %}" class="btn btn-sm btn-danger">Удалить</a>
        </div>
    </div>
</div>
{% endblock %}
