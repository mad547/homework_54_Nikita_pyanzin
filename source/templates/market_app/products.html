{% extends 'base.html' %}

{% block content %}
<div class="border rounded-3 my-4 p-3">
    <h1>Товары</h1>
</div>
<div class="row row-cols-md-3 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card h-100">
            <img src="{{ product.image }}" class="card-img-top product-img" alt="{{ product.title }}">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">{{ product.title }}</h5>
                <p class="text-muted">{{ product.category }}</p>
                <p class="card-text fw-bold">{{ product.price }} сом</p>
                <a href="{% url 'product' product.pk %}" class="card-link mt-auto ms-auto">подробнее</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p>Товаров пока нет</p>
    {% endfor %}
</div>
{% endblock %}
