<div class="row row-cols-2 row-cols-md-4 g-3">
    {% for product in products %}
    <div class="col">
        <div class="product-card">
            <img src="{{ product.image }}" class="product-img" alt="{{ product.title }}">
            <div class="product-card-body">
                <p class="text-muted small mb-1">
                    <a href="{% url 'category_products' product.category.title %}"
                       class="text-decoration-none text-muted">
                        {{ product.category }}
                    </a>
                </p>
                <h5 class="product-title">{{ product.title }}</h5>
                <p class="price-tag mb-1">{{ product.price }} сом</p>
                <p class="stock-badge mb-2">Остаток: {{ product.stock }} шт</p>
                <a href="{% url 'product' product.pk %}" class="btn-market-outline mt-auto">
                    Подробнее
                </a>
                <form method="POST" action="{% url 'cart_add' product.pk %}" class="mt-2">
                    {% csrf_token %}
                    <button type="submit" class="btn-market-success">+ В корзину</button>
                </form>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col">
        <p class="empty-market">Товаров пока нет</p>
    </div>
    {% endfor %}
</div>
