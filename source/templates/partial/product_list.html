<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card h-100 shadow-sm">
            <img src="{{ product.image }}" class="card-img-top product-img" alt="{{ product.title }}">
            <div class="card-body d-flex flex-column">
                <p class="text-muted small mb-1">
                    <a href="{{ 'category_products' product.category.title %}"
                       class="text-decoration-none text_muted">
                        {{ product.category }}
                    </a>
                </p>
                <h5 class="card-title ">{{ product.title }}</h5>
                <p class="card-text fw-bold text-success fs-5">{{ product.price }} сом</p>
                <p class="text-muted small">Остаток {{ product.stock }} шт</p>
                <a href="{{ 'product' product.pk }}" class="btn btn-outline-primary btn-sm mt-auto">
                    Подробнее
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col">
        <p class="text-muted">Товаров пока нет</p>
    </div>
    {% endfor %}
</div>
